services:
  postgres:
    image: postgres:16-alpine
    container_name: sdui-postgres
    environment:
      POSTGRES_DB: sdui
      POSTGRES_USER: sdui_owner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdui_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdui_owner -d sdui"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: sdui-backend
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: sdui
      DATABASE_USER: sdui_app
      DATABASE_PASSWORD: ${POSTGRES_APP_PASSWORD:-sdui_app_password}
      DATABASE_OWNER_USER: sdui_owner
      DATABASE_OWNER_PASSWORD: ${POSTGRES_PASSWORD:-sdui_dev_password}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      APP_PORT: 3000
      ENVIRONMENT: development
      LOCKOUT_DURATION_MINUTES: 15
      MAX_FAILED_ATTEMPTS: 3
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tsconfig.json:/app/tsconfig.json
      - sdui_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migration:run && npm run seed && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: development
    container_name: sdui-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_ENVIRONMENT: development
      VITE_APP_VERSION: 1.0.0
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  postgres_data:
  sdui_uploads:
